<title>Сданные заявления (КУВД) — с. Бухта</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--text:#17202a;--muted:#667085;--line:#d7dde5;--green:#147d64;--red:#b42318;--blue:#175cd3}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
header{background:#17202a;color:#fff;padding:24px} header h1{margin:0 0 6px;font-size:25px} header p{margin:0;color:#d0d5dd}
.wrap{max-width:1180px;margin:auto;padding:20px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px}.stat b{display:block;font-size:24px}.stat span{color:var(--muted);font-size:13px}
.controls{position:sticky;top:0;background:var(--bg);padding:10px 0;margin-bottom:12px;z-index:5}
input{width:100%;padding:11px 12px;border:1px solid #bfc7d1;border-radius:10px;font-size:14px}
.countline{color:var(--muted);font-size:13px;margin:-4px 0 12px}
.owner{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:0 0 14px;overflow:hidden}
.owner-head{padding:12px 16px;background:#eef2f6;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.owner-head h2{margin:0;font-size:18px}.owner-head .n{color:var(--muted);font-weight:600}
.nums{display:flex;flex-wrap:wrap;gap:7px;padding:14px 16px}
.num{font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace;font-size:12.5px;background:#f3f6f9;border:1px solid var(--line);border-radius:7px;padding:5px 9px;cursor:pointer;user-select:all}
.num:hover{border-color:var(--blue);color:var(--blue)}
.note{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:12px 15px;margin:16px 0}
.hidden{display:none!important}
footer{color:var(--muted);padding:14px 0 26px;font-size:13px}
a.back{color:var(--blue);text-decoration:none;font-size:13px}
@media(max-width:800px){.summary{grid-template-columns:repeat(2,1fr)}}
@media print{.controls{display:none}body{background:#fff}}
</style></head>

function stats(){
 const S=document.getElementById("summary");
 const card=(n,l)=>`<div class="stat"><b>${n}</b><span>${l}</span></div>`;
 S.innerHTML=card(DATA.total,"всего сдано КУВД")+card(DATA.owners.length,"владельцев")+card(DATA.битые.length,"битых номеров")+card(DATA.дубли.length,"дублей");
}
function render(){
 const q=document.getElementById("q").value.toLowerCase().trim();
 const app=document.getElementById("app");app.innerHTML="";
 let shownOwners=0, shownNums=0;
 DATA.owners.forEach(o=>{
  const nums=o.kuvds.filter(n=>!q||n.toLowerCase().includes(q)||(o.short+" "+o.full).toLowerCase().includes(q));
  if(!nums.length)return;
  shownOwners++;shownNums+=nums.length;
  const el=document.createElement("section");el.className="owner";
  el.innerHTML=`<div class="owner-head"><h2>${esc(o.short)}</h2><span class="n">${nums.length}${nums.length!==o.count?" / "+o.count:""} КУВД</span></div>
   <div class="nums">${nums.map(n=>`<span class="num" title="нажмите, чтобы выделить">${esc(n)}</span>`).join("")}</div>`;
  app.appendChild(el);
 });
 document.getElementById("countline").textContent=`Показано: ${shownNums} КУВД у ${shownOwners} владельц.`;
 if(!shownNums)app.innerHTML='<div class="note">Ничего не найдено.</div>';
 const P=document.getElementById("problems");
 if(!q){P.innerHTML=`<div class="note"><b>Проблемные номера:</b><br>Битые: ${DATA.битые.map(esc).join(", ")||"—"}<br>Дубли (присланы дважды): ${DATA.дубли.map(esc).join(", ")||"—"}</div>`;}
 else P.innerHTML="";
}
document.getElementById("q").addEventListener("input",render);
stats();render();
