<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="referrer" content="no-referrer">
<title>Кадастровая карта — Херсон + Запоріжжя</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2433;
    --border: #2a2f42;
    --accent: #e8c547;
    --red: #e05252;
    --green: #4caf7d;
    --blue: #4a9eff;
    --orange: #e8a547;
    --text: #d8dce8;
    --muted: #8b91a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; line-height: 1.5;
    display: flex; flex-direction: column;
  }
  header {
    border-bottom: 2px solid var(--accent);
    padding: 12px 24px;
    background: linear-gradient(180deg, #0d1520 0%, var(--bg) 100%);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  header .left .label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
  }
  header h1 { font-size: 17px; font-weight: 700; color: #fff; }
  header .right { display: flex; gap: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  header .right .v { color: var(--accent); font-weight: 600; }
  header .right .l { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

  .layout { display: flex; flex: 1; min-height: 0; }
  aside.left {
    width: 280px; background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 16px;
    flex-shrink: 0;
  }
  aside.right {
    width: 380px; background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column;
  }
  #map { flex: 1; background: #0a0e15; }

  .filter-group { margin-bottom: 16px; }
  .filter-group > label {
    display: block; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
  }
  .filter-group input, .filter-group select {
    width: 100%; padding: 8px 10px; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 12px;
  }
  .filter-group input:focus, .filter-group select:focus { outline: none; border-color: var(--accent); }

  .btn-reset, .btn-export {
    width: 100%; padding: 8px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .btn-reset:hover { color: var(--accent); border-color: var(--accent); }
  .btn-export {
    background: var(--accent); color: #1a1a1a; border-color: var(--accent); font-weight: 600;
  }
  .btn-export:hover { background: #f5d54f; }
  .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-export-sm {
    padding: 5px 10px; background: var(--accent); color: #1a1a1a; border: none;
    border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  }
  .btn-export-sm:hover { background: #f5d54f; }

  .stats-block {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px; margin-bottom: 16px;
  }
  .stats-block h3 {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }
  .stats-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .stats-row .k { color: var(--muted); }
  .stats-row .v { color: var(--accent); font-family: 'IBM Plex Mono', monospace; }

  .detail-header {
    padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .detail-header .code {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent);
  }
  .detail-header h2 { font-size: 16px; color: #fff; margin: 4px 0; }
  .detail-header .meta { font-size: 11px; color: var(--muted); display: flex; gap: 12px; }
  .detail-empty {
    padding: 24px 16px; color: var(--muted); font-size: 12px; text-align: center;
  }

  .detail-stats { padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .detail-stats .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
  .detail-stats .row .k { color: var(--muted); }
  .detail-stats .row .v { color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .detail-stats .row .v.big { color: var(--accent); font-weight: 600; }

  .detail-section { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .detail-section h4 {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px;
  }
  .bar-list .bar-row {
    display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; font-size: 11px;
    border-bottom: 1px dotted var(--border);
  }
  .bar-list .bar-row:last-child { border-bottom: none; }
  .bar-list .bar-row .name { flex: 1; color: var(--text); word-break: break-word; line-height: 1.35; }
  .bar-list .bar-row .count { font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 11px; min-width: 30px; text-align: right; }

  .parcel-list {
    flex: 1; overflow-y: auto; padding: 8px 16px 16px;
  }
  .parcel-list h4 {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin: 8px 0;
    position: sticky; top: 0; background: var(--surface); padding: 4px 0 6px;
  }
  .parcel {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
    padding: 8px 10px; margin-bottom: 6px; font-size: 11px;
  }
  .parcel .cad {
    font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 11px;
    cursor: pointer;
    word-break: break-all;
  }
  .parcel .cad:hover { color: var(--blue); }
  .parcel .area {
    float: right; font-family: 'IBM Plex Mono', monospace;
    color: var(--green); font-size: 11px;
  }
  .parcel .field { margin-top: 4px; color: var(--muted); }
  .parcel .field .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .parcel .field .val { color: var(--text); }

  /* Custom marker */
  .council-marker {
    background: var(--accent);
    color: #1a1a1a;
    border-radius: 50%;
    border: 2px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-family: 'IBM Plex Mono', monospace;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .council-marker:hover { transform: scale(1.1); }
  .council-marker.active { background: var(--blue); color: #fff; border-color: var(--accent); }
  .council-marker.dimmed { opacity: 0.25; }

  .leaflet-popup-content-wrapper {
    background: var(--surface2); color: var(--text); border-radius: 4px; border: 1px solid var(--border);
  }
  .leaflet-popup-content { font-size: 12px; }
  .leaflet-popup-tip { background: var(--surface2); }
  .leaflet-popup-content .pname { font-weight: 600; color: var(--accent); font-size: 13px; }
  .leaflet-popup-content .pstats { margin-top: 4px; color: var(--muted); font-size: 11px; font-family: 'IBM Plex Mono', monospace; }

  /* Search results pane */
  #search-results { max-height: 180px; overflow-y: auto; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; margin-top: 4px; display: none; }
  #search-results .item {
    padding: 6px 8px; font-size: 11px; cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  #search-results .item:last-child { border-bottom: none; }
  #search-results .item:hover { background: var(--border); }
  #search-results .item .cad { font-family: 'IBM Plex Mono', monospace; color: var(--accent); }
  #search-results .item .who { color: var(--muted); font-size: 10px; margin-top: 2px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Mobile */
  @media (max-width: 900px) {
    aside.left, aside.right { width: 220px; }
  }
</style>
</head>
<body>
<header>
  <div class="left">
    <div class="label">КАДАСТРОВАЯ КАРТА</div>
    <h1>Нижнесерогозский р-н (Херсон) + Веселівський р-н (Запоріжжя)</h1>
  </div>
  <div class="right">
    <div><div class="v" id="hstat-parcels">0</div><div class="l">участков</div></div>
    <div><div class="v" id="hstat-area">0</div><div class="l">га</div></div>
    <div><div class="v" id="hstat-councils">0</div><div class="l">сельсоветов</div></div>
    <div><div class="v" id="hstat-filtered">—</div><div class="l">отфильтр. участков</div></div>
    <div><div class="v" id="hstat-filtered-area">—</div><div class="l">отфильтр. га</div></div>
  </div>
</header>

<div class="layout">
  <aside class="left">
    <div class="filter-group">
      <label>Поиск (кадастр или ФИО/компания)</label>
      <input id="search" type="text" placeholder="напр. 6523884500 или АГРОДОМ" autocomplete="off"/>
      <div id="search-results"></div>
    </div>

    <div class="filter-group">
      <label>Арендатор</label>
      <select id="filter-renter">
        <option value="">— все —</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Форма собственности <span style="text-transform:none;color:var(--muted);letter-spacing:0;font-size:9px">(несколько)</span></label>
      <div id="filter-ownership" style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:11px"></div>
    </div>

    <div class="filter-group">
      <label>Категория земель</label>
      <select id="filter-category">
        <option value="">— все —</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Регион</label>
      <select id="filter-region">
        <option value="">— все —</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Год окончания договора</label>
      <select id="filter-lease-year">
        <option value="">— любой —</option>
        <option value="expired">просрочен (до 2026)</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
        <option value="2029">2029</option>
        <option value="2030">2030</option>
        <option value="2030+">2030 и позже</option>
        <option value="none">нет договора</option>
      </select>
    </div>

    <button class="btn-export" id="btn-export-all">📥 Выгрузить в Excel</button>
    <button class="btn-reset" id="btn-toggle-polys" style="background:transparent;color:var(--blue);border-color:var(--blue);margin-bottom:6px">⌘ Контуры участков</button>
    <button class="btn-reset" id="btn-reset">Сбросить фильтры</button>

    <div style="height: 16px"></div>

    <div class="stats-block">
      <h3>Все арендаторы (<span id="renters-count">0</span>) <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;float:right">клик = фильтр</span></h3>
      <input id="renters-search" type="text" placeholder="фильтр по имени…" style="width:100%;padding:6px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:3px;font-family:inherit;font-size:11px;margin-bottom:8px"/>
      <div id="top-renters" style="max-height:380px;overflow-y:auto"></div>
    </div>

    <div class="stats-block">
      <h3>Форма собственности</h3>
      <div id="ownership-split"></div>
    </div>
  </aside>

  <div id="map"></div>

  <aside class="right">
    <div id="detail" class="detail-empty">
      Клик по маркеру сельсовета — детали и список участков
    </div>
  </aside>
</div>

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const COUNCILS = DATA.councils;
const STATS = DATA.stats;
const FILTERS = DATA.filters;
const RENTER_COUNCILS = DATA.renter_councils || {};

// Init map
const map = L.map('map', { zoomControl: true, attributionControl: true }).setView([46.88, 34.40], 10);

// Polygon layers cache, keyed by council code
const polygonLayers = {};        // code → L.geoJSON
const parcelGeomIndex = {};      // cadnum → feature (for popups)
let polygonsVisible = true;

// Per-council parcel data cache (lazy-loaded)
async function ensureCouncilParcels(council) {
  if (council.parcels) return council.parcels;
  if (council._loading) return council._loading;
  council._loading = (async () => {
    try {
      const resp = await fetch(`councils/${council.code}.json`);
      if (!resp.ok) { council.parcels = []; return []; }
      const data = await resp.json();
      council.parcels = data.parcels || [];
      return council.parcels;
    } catch (e) {
      console.warn(`No data for ${council.code}:`, e);
      council.parcels = [];
      return [];
    }
  })();
  const result = await council._loading;
  delete council._loading;
  return result;
}

async function loadCouncilPolygons(code) {
  if (polygonLayers[code]) return polygonLayers[code];
  const council = COUNCILS.find(c => c.code === code);
  if (!council) return null;
  // Ensure council data is loaded for popup info
  await ensureCouncilParcels(council);
  try {
    const resp = await fetch(`parcels/${code}.geojson`);
    if (!resp.ok) return null;
    const fc = await resp.json();
    const layer = L.geoJSON(fc, {
      style: f => parcelStyle(f, council),
      onEachFeature: (f, l) => {
        const cad = f.properties.cadnum;
        parcelGeomIndex[cad] = f;
        const data = (council.parcels || []).find(p => p.c === cad);
        l.bindPopup(buildParcelPopup(cad, data, council));
        l.on('mouseover', () => l.setStyle({ weight: 2, color: '#fff' }));
        l.on('mouseout',  () => layer.resetStyle(l));
      }
    });
    if (polygonsVisible) layer.addTo(map);
    polygonLayers[code] = layer;
    return layer;
  } catch (e) {
    console.warn(`No polygons for ${code}:`, e);
    return null;
  }
}

function parcelStyle(f, council) {
  const cad = f.properties.cadnum;
  const data = council ? council.parcels.find(p => p.c === cad) : null;
  let fill = '#888';
  if (data) {
    if (data.ot === 'Приватна власність') fill = '#4caf7d';
    else if (data.ot === 'Комунальна власність') fill = '#e8c547';
    else if (data.ot === 'Державна власність') fill = '#4a9eff';
    else fill = '#e05252';  // не визначено
  } else {
    fill = '#3a3f55'; // нет данных в нашей базе — серый
  }
  return { fillColor: fill, color: '#1a1a1a', weight: 0.6, fillOpacity: 0.5 };
}

function buildParcelPopup(cad, data, council) {
  if (!data) {
    return `<div style="font-size:12px"><div style="font-family:'IBM Plex Mono',monospace;color:#1a1a1a;font-weight:600">${cad}</div><div style="color:#666;font-size:11px">нет данных в базе</div></div>`;
  }
  const expColor = data.ey && data.ey < 2026 ? '#e05252' : data.ey && data.ey <= 2027 ? '#e8a547' : '#1a1a1a';
  return `
    <div style="font-size:12px;color:#1a1a1a;max-width:300px">
      <div style="font-family:'IBM Plex Mono',monospace;font-weight:600">${cad}</div>
      <div style="font-size:11px;color:#666;margin-bottom:4px">${data.a} га · ${council ? council.name : ''}</div>
      ${data.r ? `<div><b>аренд.:</b> ${data.r}</div>` : ''}
      ${data.o ? `<div><b>собств.:</b> ${data.o}</div>` : ''}
      ${data.ed ? `<div><b>договор до:</b> <span style="color:${expColor}">${data.ed}</span>${data.cn?` · №${data.cn}`:''}</div>` : ''}
      ${data.ot ? `<div style="color:#666;font-size:10px;margin-top:4px">${data.ot}</div>` : ''}
    </div>`;
}

function togglePolygons() {
  polygonsVisible = !polygonsVisible;
  Object.values(polygonLayers).forEach(l => {
    if (polygonsVisible) l.addTo(map); else map.removeLayer(l);
  });
}
// Базовые слои
const baseDark = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OpenStreetMap', className: 'map-tiles map-tiles-dark',
});
const baseLight = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OpenStreetMap',
});
const baseSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: '© Esri Imagery',
});
baseDark.addTo(map);

// Dark filter только для baseDark
const style = document.createElement('style');
style.textContent = '.map-tiles-dark { filter: invert(0.92) hue-rotate(180deg) brightness(0.9) contrast(0.85) saturate(0.7); }';
document.head.appendChild(style);

L.control.layers({
  'OSM тёмная': baseDark,
  'OSM светлая': baseLight,
  'Спутник': baseSat,
}, null, { collapsed: false, position: 'topright' }).addTo(map);

let markers = {};
let activeCode = null;
let filterRenter = '';
let filterOwnership = new Set();
let filterCategory = '';
let filterRegion = '';
let filterLeaseYear = '';

function matchLeaseYear(p) {
  if (!filterLeaseYear) return true;
  const y = p.ey;
  if (filterLeaseYear === 'none') return !y;
  if (filterLeaseYear === 'expired') return y && y < 2026;
  if (filterLeaseYear === '2030+') return y && y >= 2030;
  return y && String(y) === filterLeaseYear;
}

function markerSize(count) {
  // Logarithmic scale
  if (count <= 1) return 22;
  return Math.min(60, 22 + Math.log2(count) * 5);
}

function markerColor(council, filteredCount) {
  if (filteredCount === 0) return '#3a3f55';
  if (filteredCount < council.total * 0.3) return '#e08252';
  return '#e8c547';
}

function parcelMatchesFilters(p, councilRegion) {
  if (filterRegion && councilRegion !== filterRegion) return false;
  if (filterRenter && p.r !== filterRenter) return false;
  if (filterOwnership.size > 0 && !filterOwnership.has(p.ot)) return false;
  if (filterCategory && p.ct !== filterCategory) return false;
  if (!matchLeaseYear(p)) return false;
  return true;
}

function hasAnyFilter() {
  return !!(filterRenter || filterOwnership.size > 0 || filterCategory || filterRegion || filterLeaseYear);
}

function getFilteredCount(council) {
  return getFilteredStats(council).count;
}

// v2: используем агрегаты, если parcels не загружены
function getFilteredStats(council) {
  if (!hasAnyFilter()) return { count: council.total, area: council.area };
  // If parcels already loaded, compute exactly
  if (council.parcels) {
    let n = 0, a = 0;
    for (const p of council.parcels) if (parcelMatchesFilters(p, council.region)) { n++; a += p.a || 0; }
    return { count: n, area: Math.round(a * 10) / 10 };
  }
  // Otherwise approximate from aggregates
  if (filterRegion && council.region !== filterRegion) return { count: 0, area: 0 };
  let fraction = 1.0;
  if (filterRenter) {
    const r = (council.top_renters || []).find(([n,_]) => n === filterRenter);
    fraction *= r ? r[1] / council.total : 0;
  }
  if (filterOwnership.size > 0) {
    let n = 0;
    for (const ot of filterOwnership) n += council.by_ownership[ot] || 0;
    fraction *= n / council.total;
  }
  if (filterCategory) {
    const c = (council.top_categories || []).find(([n,_]) => n === filterCategory);
    fraction *= c ? c[1] / council.total : 0;
  }
  if (filterLeaseYear) {
    let ly_count = 0;
    if (filterLeaseYear === 'none') {
      const has_lease = Object.values(council.lease_years || {}).reduce((s,v)=>s+v, 0);
      ly_count = council.total - has_lease;
    } else if (filterLeaseYear === 'expired') {
      for (const [y, c] of Object.entries(council.lease_years || {})) {
        if (parseInt(y) < 2026) ly_count += c;
      }
    } else if (filterLeaseYear === '2030+') {
      for (const [y, c] of Object.entries(council.lease_years || {})) {
        if (parseInt(y) >= 2030) ly_count += c;
      }
    } else {
      ly_count = (council.lease_years || {})[filterLeaseYear] || 0;
    }
    fraction *= ly_count / council.total;
  }
  const count = Math.round(council.total * fraction);
  const area = Math.round(council.area * fraction * 10) / 10;
  return { count, area };
}

function fmt(n) { return Number(n).toLocaleString('ru'); }

function buildMarkers() {
  // Clear existing
  for (const k in markers) { map.removeLayer(markers[k]); }
  markers = {};

  const hasFilter = hasAnyFilter();
  let totalCount = 0, totalArea = 0;

  COUNCILS.forEach(c => {
    if (!c.lat) return;
    const fs = getFilteredStats(c);
    totalCount += fs.count;
    totalArea += fs.area;
    const sz = markerSize(c.total);
    const col = markerColor(c, fs.count);
    const icon = L.divIcon({
      html: `<div class="council-marker" style="width:${sz}px;height:${sz}px;background:${col};font-size:${Math.max(9, sz/4)}px">${fs.count}</div>`,
      className: '', iconSize: [sz, sz], iconAnchor: [sz/2, sz/2]
    });
    const m = L.marker([c.lat, c.lon], { icon }).addTo(map);
    const ttArea = hasFilter
      ? `${fmt(fs.area)} / ${fmt(c.area)} га`
      : `${fmt(c.area)} га`;
    m.bindTooltip(`<div class="pname">${c.name}</div><div class="pstats">${fs.count} участков · ${ttArea}</div>`, {
      direction: 'top', offset: [0, -sz/2], opacity: 0.95
    });
    m.on('click', () => {
      showDetail(c.code);
      loadCouncilPolygons(c.code);  // ленивая подгрузка контуров
    });
    markers[c.code] = m;
  });

  document.getElementById('hstat-filtered').textContent      = hasFilter ? fmt(totalCount) : '—';
  document.getElementById('hstat-filtered-area').textContent = hasFilter ? fmt(Math.round(totalArea * 10) / 10) : '—';
}

async function showDetail(code) {
  activeCode = code;
  const c = COUNCILS.find(x => x.code === code);
  if (!c) return;
  const det = document.getElementById('detail');
  det.classList.remove('detail-empty');
  // Show loading state immediately
  if (!c.parcels) {
    det.innerHTML = `
      <div class="detail-header">
        <div class="code">${c.code}</div>
        <h2>${c.name}</h2>
        <div class="meta"><span>${c.total} участков</span><span>${c.area.toLocaleString('ru')} га</span></div>
      </div>

function loadMoreParcels() {
  const parcels = window._curParcels || [];
  const prev = window._curShown || 0;
  const next = Math.min(prev + 300, parcels.length);
  const btn = document.getElementById('parcel-more');
  const head = document.getElementById('parcel-list-head');
  // Insert new cards before the button
  const html = parcels.slice(prev, next).map(renderParcelCard).join('');
  btn.insertAdjacentHTML('beforebegin', html);
  window._curShown = next;
  // Update or remove the button
  if (next >= parcels.length) {
    btn.remove();
    head.textContent = head.textContent.replace(/ — показано .*$/, ` (${parcels.length})`);
  } else {
    btn.textContent = `Показать ещё ${Math.min(300, parcels.length - next)} из ${parcels.length - next}`;
    head.textContent = head.textContent.replace(/показано \d+ из \d+/, `показано ${next} из ${parcels.length}`);
  }
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function downloadCsv(rows, filename) {
  if (!rows.length) { alert('Нет данных для выгрузки'); return; }
  const cols = Object.keys(rows[0]);
  const esc = v => {
    if (v == null) return '';
    const s = String(v);
    return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const lines = [cols.join(';')];
  for (const r of rows) lines.push(cols.map(c => esc(r[c])).join(';'));
  const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function downloadXlsx(rows, filename, sheetName) {
  if (!rows.length) { alert('Нет данных для выгрузки'); return; }
  // Большие выгрузки — CSV вместо XLSX (SheetJS не тянет >100k строк)
  if (rows.length > 50000) {
    if (confirm(`${rows.length.toLocaleString('ru')} строк — XLSX в браузере не справится. Выгрузить в CSV (открывается в Excel)?`)) {
      const csvName = filename.replace(/\.xlsx$/, '.csv');
      downloadCsv(rows, csvName);
    }
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  const widths = {
    'Кадастровый номер': 24, 'Площадь, га': 12, 'Регион': 12,
    'Сельсовет': 28, 'Код сельсовета': 14, 'Форма собственности': 22,
    'Категория земель': 38, 'Собственник': 40, 'Совладельцев всего': 8,
    'ІПН собственника': 14, 'Дата рег. права собств.': 18,
    'Арендатор': 40, 'ЄДРПОУ арендатора': 14, '№ договора': 14,
    'Дата регистрации договора': 18, 'Окончание договора': 16,
    'Размер аренды, грн': 14, '% НГО': 8, 'Адрес': 60,
  };
  ws['!cols'] = Object.keys(rows[0]).map(k => ({ wch: widths[k] || 18 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName || 'Участки');
  XLSX.writeFile(wb, filename);
}

async function exportFiltered() {
  const btn = document.getElementById('btn-export-all');
  const origText = btn.textContent;
  try {
    // Determine which councils to load
    let targetCouncils;
    if (filterRenter && RENTER_COUNCILS[filterRenter]) {
      targetCouncils = COUNCILS.filter(c => RENTER_COUNCILS[filterRenter].includes(c.code));
    } else if (filterRegion) {
      targetCouncils = COUNCILS.filter(c => c.region === filterRegion);
    } else {
      if (!confirm(`Внимание: фильтр не выбран. Будет ~600k участков (Excel может зависнуть). Лучше выбрать арендатора/регион. Всё равно экспортировать?`)) {
        btn.textContent = origText; btn.disabled = false; return;
      }
      targetCouncils = COUNCILS;
    }
    btn.disabled = true;
    btn.textContent = `Загрузка...`;
    const need = targetCouncils.filter(c => !c.parcels);
    if (need.length > 0) {
      let loaded = 0;
      for (let i=0; i<need.length; i+=10) {
        await Promise.all(need.slice(i, i+10).map(c => ensureCouncilParcels(c)));
        loaded += Math.min(10, need.length - i);
        btn.textContent = `Загрузка ${loaded}/${need.length}…`;
      }
    }
    btn.textContent = 'Формирую Excel...';
  const rows = [];
  for (const c of targetCouncils) {
    for (const p of (c.parcels || [])) {
      if (parcelMatchesFilters(p, c.region)) rows.push(parcelsToRows([p], c)[0]);
    }
  }
  const stamp = new Date().toISOString().slice(0,10);
  let suffix = 'все';
  const tags = [];
  if (filterRegion) tags.push('рег_' + filterRegion);
  if (filterRenter) tags.push('аренд_' + filterRenter.slice(0,30).replace(/[^а-яА-Яa-zA-Z0-9]/g,'_'));
  if (filterOwnership.size > 0) tags.push('собств_' + Array.from(filterOwnership).join('_').slice(0,40).replace(/[^а-яА-Яa-zA-Z0-9]/g,'_'));
  if (filterCategory) tags.push('кат_' + filterCategory.slice(0,30).replace(/[^а-яА-Яa-zA-Z0-9]/g,'_'));
  if (filterLeaseYear) tags.push('год_' + filterLeaseYear);
  if (tags.length) suffix = tags.join('__');
  downloadXlsx(rows, `Кадастр_${suffix}_${stamp}.xlsx`, 'Участки');
  } catch (e) {
    alert('Ошибка экспорта: ' + (e.message || e));
    console.error(e);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

async function exportCouncil(code) {
  const c = COUNCILS.find(x => x.code === code);
  if (!c) return;
  await ensureCouncilParcels(c);
  const parcels = (c.parcels || []).filter(p => parcelMatchesFilters(p, c.region));
  const rows = parcelsToRows(parcels, c);
  const stamp = new Date().toISOString().slice(0,10);
  const safe = c.name.replace(/[^а-яА-Яa-zA-Z0-9]/g,'_');
  downloadXlsx(rows, `${safe}_${stamp}.xlsx`, c.name.slice(0,30));
}

// Highlight a specific parcel polygon: pan and bring popup up
async function navigateToParcel(cadnum) {
  const rada = cadnum.slice(0, 10);
  const council = COUNCILS.find(c => c.code === rada);
  if (!council) {
    sr.innerHTML = `<div class="item" style="color:var(--muted)">Сельсовет ${rada} не найден на карте</div>`;
    sr.style.display = 'block';
    return;
  }
  // Center on council, open details, load polygons
  map.flyTo([council.lat, council.lon], 14, { duration: 0.5 });
  showDetail(council.code);
  const layer = await loadCouncilPolygons(council.code);
  if (!layer) {
    sr.innerHTML = `<div class="item" style="color:var(--muted)">Полигоны ${rada} не загрузились</div>`;
    sr.style.display = 'block';
    return;
  }
  // Find the specific feature
  let target = null;
  layer.eachLayer(l => {
    if (l.feature && l.feature.properties.cadnum === cadnum) target = l;
  });
  if (target) {
    // Zoom to parcel + open popup
    const b = target.getBounds();
    map.fitBounds(b, { padding: [60, 60], maxZoom: 18 });
    setTimeout(() => target.openPopup(), 600);
    // Briefly highlight
    target.setStyle({ weight: 3, color: '#ff0' });
    setTimeout(() => layer.resetStyle(target), 3000);
  } else {
    sr.innerHTML = `<div class="item" style="color:var(--muted)">Кадастр ${cadnum} нет в полигонах</div>`;
    sr.style.display = 'block';
    return;
  }
}

const CADNUM_RE = /^\d{10}:\d{2}:\d{3}:\d{4}$/;

search.addEventListener('input', e => {
  const q = e.target.value.trim();
  if (q.length < 3) { sr.style.display = 'none'; return; }
  // Full cadnum: navigate directly
  if (CADNUM_RE.test(q)) {
    navigateToParcel(q);
    return;
  }
  // Partial cadnum starting with digits: suggest opening council
  if (/^\d{4,10}/.test(q)) {
    const prefix = q.slice(0, 10);
    const council = COUNCILS.find(c => c.code === prefix || c.code.startsWith(q));
    const matches = COUNCILS.filter(c => c.code.startsWith(q.replace(/[:].*/,'')));
    sr.innerHTML = matches.slice(0,20).map((c,i)=>`
      <div class="item" data-i="${i}">
        <div class="cad">${c.code}</div>
        <div class="who">${escapeHtml(c.name)} · ${c.total} участков</div>
      </div>
    `).join('') || '<div class="item" style="color:var(--muted)">Сельсовет не найден</div>';
    sr.style.display = 'block';
    sr.querySelectorAll('.item').forEach((el,i) => {
      el.addEventListener('click', () => {
        const c = matches[i];
        map.flyTo([c.lat, c.lon], 13, { duration: 0.6 });
        showDetail(c.code);
        sr.style.display = 'none';
      });
    });
    return;
  }
  // Free text — search across loaded councils (partial coverage)
  const ql = q.toLowerCase();
  const results = [];
  for (const c of COUNCILS) {
    // Search council name
    if (c.name.toLowerCase().includes(ql)) {
      results.push({ type: 'council', council: c });
      if (results.length >= 50) break;
    }
    // Search loaded parcels (those councils that user already opened)
    if (c.parcels) {
      for (const p of c.parcels) {
        const hit = (p.o && p.o.toLowerCase().includes(ql))
                 || (p.r && p.r.toLowerCase().includes(ql))
                 || (p.ad && p.ad.toLowerCase().includes(ql));
        if (hit) {
          results.push({ type: 'parcel', p, council: c });
          if (results.length >= 50) break;
        }
      }
      if (results.length >= 50) break;
    }
  }
  if (!results.length) {
    sr.innerHTML = '<div class="item" style="color:var(--muted)">Ничего не найдено. Для поиска по ФИО/арендатору сначала откройте нужный сельсовет.</div>';
    sr.style.display = 'block';
    return;
  }
  sr.innerHTML = results.map((r,i)=>{
    if (r.type === 'council') return `
      <div class="item" data-i="${i}">
        <div class="cad">${escapeHtml(r.council.name)}</div>
        <div class="who">${r.council.code} · ${r.council.total} участков</div>
      </div>`;
    return `
      <div class="item" data-i="${i}">
        <div class="cad">${escapeHtml(r.p.c)}</div>
        <div class="who">${escapeHtml(r.council.name)}${r.p.r? ' · аренд.: '+escapeHtml(r.p.r.slice(0,40)):''}${r.p.o? ' · '+escapeHtml(r.p.o.slice(0,40)):''}</div>
      </div>`;
  }).join('');
  sr.style.display = 'block';
  sr.querySelectorAll('.item').forEach((el,i) => {
    el.addEventListener('click', () => {
      const r = results[i];
      if (r.type === 'council') {
        map.flyTo([r.council.lat, r.council.lon], 13, { duration: 0.6 });
        showDetail(r.council.code);
      } else {
        navigateToParcel(r.p.c);
      }
      sr.style.display = 'none';
    });
  });
});
document.addEventListener('click', e => {
  if (!e.target.closest('.filter-group')) sr.style.display = 'none';
});

renderSidebar();
document.getElementById('renters-search').addEventListener('input', e => renderRentersList(e.target.value));
buildMarkers();

// Fit bounds to all councils
const bounds = L.latLngBounds(COUNCILS.filter(c=>c.lat).map(c=>[c.lat,c.lon]));
map.fitBounds(bounds, { padding: [40, 40] });
</script>
</body>
</html>
