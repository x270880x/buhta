<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="googlebot" content="noindex,nofollow">
<meta name="referrer" content="no-referrer">
<title>Бухта — кадастровая карта</title>
<meta name="description" content="Бухта — кадастровая карта"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2433;
    --border: #2a2f42;
    --accent: #e8c547;
    --red: #e05252;
    --green: #4caf7d;
    --blue: #4a9eff;
    --orange: #e8a547;
    --text: #d8dce8;
    --muted: #8b91a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; line-height: 1.5;
    display: flex; flex-direction: column;
  }
  header {
    border-bottom: 2px solid var(--accent);
    padding: 12px 24px;
    background: linear-gradient(180deg, #0d1520 0%, var(--bg) 100%);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  header .left .label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
  }
  header h1 { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.25; }
  header h1 .h-sub { font-size: 0.72em; font-weight: 400; color: #b8bcc8; }
  header h1 .h-main { font-size: 1.2em; }
  header .right { display: flex; gap: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 17px; align-items: baseline; }
  header .right > div { display: flex; align-items: baseline; gap: 6px; }
  header .right .v { color: var(--accent); font-weight: 600; }
  header .right .l { color: var(--muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

  .layout { display: flex; flex: 1; min-height: 0; }
  aside.left {
    width: 242px; background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 16px;
    flex-shrink: 0;
    display: flex; flex-direction: column;
  }
  aside.left .recent-block { margin-top: auto; }
  aside.right {
    width: 380px; background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column;
  }
  #map { flex: 1; background: #0a0e15; }

  .filter-group { margin-bottom: 16px; }
  .filter-group > label {
    display: block; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
  }
  .filter-group input, .filter-group select {
    width: 100%; padding: 8px 10px; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 12px;
  }
  .filter-group input:focus, .filter-group select:focus { outline: none; border-color: var(--accent); }

  .btn-reset, .btn-export {
    width: 100%; padding: 8px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .btn-reset:hover { color: var(--accent); border-color: var(--accent); }
  .btn-export {
    background: var(--accent); color: #1a1a1a; border-color: var(--accent); font-weight: 600;
  }
  .btn-export:hover { background: #f5d54f; }
  .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-export-sm {
    padding: 5px 10px; background: var(--accent); color: #1a1a1a; border: none;
    border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  }
  .btn-export-sm:hover { background: #f5d54f; }

  .stats-block {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px; margin-bottom: 16px;
  }
  .stats-block h3 {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }
  .stats-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .stats-row .k { color: var(--muted); }
  .stats-row .v { color: var(--accent); font-family: 'IBM Plex Mono', monospace; }

  .detail-header {
    padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .detail-header .code {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent);
  }
  .detail-header h2 { font-size: 16px; color: #fff; margin: 4px 0; }
  .detail-header .meta { font-size: 11px; color: var(--muted); display: flex; gap: 12px; }
  .detail-empty {
    padding: 24px 16px; color: var(--muted); font-size: 12px; text-align: center;
  }

  .detail-stats { padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .detail-stats .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
  .detail-stats .row .k { color: var(--muted); }
  .detail-stats .row .v { color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .detail-stats .row .v.big { color: var(--accent); font-weight: 600; }

  .detail-section { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .detail-section h4 {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px;
  }
  .bar-list .bar-row {
    display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; font-size: 11px;
    border-bottom: 1px dotted var(--border);
  }
  .bar-list .bar-row:last-child { border-bottom: none; }
  .bar-list .bar-row .name { flex: 1; color: var(--text); word-break: break-word; line-height: 1.35; }
  .bar-list .bar-row .count { font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 11px; min-width: 30px; text-align: right; }

  .parcel-list {
    flex: 1; overflow-y: auto; padding: 8px 16px 16px;
  }
  .parcel-list h4 {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin: 8px 0;
    position: sticky; top: 0; background: var(--surface); padding: 4px 0 6px;
  }
  .parcel {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
    padding: 8px 10px; margin-bottom: 6px; font-size: 11px;
  }
  .parcel .cad {
    font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 11px;
    cursor: pointer;
    word-break: break-all;
  }
  .parcel .cad:hover { color: var(--blue); }
  .parcel .area {
    float: right; font-family: 'IBM Plex Mono', monospace;
    color: var(--green); font-size: 11px;
  }
  .parcel .field { margin-top: 4px; color: var(--muted); }
  .parcel .field .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .parcel .field .val { color: var(--text); }

  /* Custom marker */
  .council-marker {
    background: var(--accent);
    color: #1a1a1a;
    border-radius: 50%;
    border: 2px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-family: 'IBM Plex Mono', monospace;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .council-marker:hover { transform: scale(1.1); }
  .council-marker.active { background: var(--blue); color: #fff; border-color: var(--accent); }
  .council-marker.dimmed { opacity: 0.25; }

  .leaflet-popup-content-wrapper {
    background: var(--surface2); color: var(--text); border-radius: 4px; border: 1px solid var(--border);
  }
  .leaflet-popup-content { font-size: 12px; }
  .leaflet-popup-tip { background: var(--surface2); }
  .leaflet-popup-content .pname { font-weight: 600; color: var(--accent); font-size: 13px; }
  .leaflet-popup-content .pstats { margin-top: 4px; color: var(--muted); font-size: 11px; font-family: 'IBM Plex Mono', monospace; }

  /* Статистика (кнопка в шапке + модалка) */
  #stats-btn {
    background: var(--surface2); color: var(--accent); border: 1px solid var(--accent);
    border-radius: 4px; padding: 6px 12px; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 600; align-self: center;
  }
  #stats-btn:hover { background: var(--accent); color: #1a1a1a; }
  #stats-modal {
    position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,.55);
    display: none; align-items: center; justify-content: center;
  }
  #stats-modal.open { display: flex; }
  .stats-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    width: min(460px, 92vw); max-height: 86vh; overflow-y: auto;
    padding: 14px 18px 18px; box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  .stats-head { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 15px; color: #fff; margin-bottom: 10px; }
  .stats-head button { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 2px; }
  .stats-head button:hover { color: #fff; }
  .stats-sec { color: var(--accent); font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin: 12px 0 6px; }
  .stats-row { display: flex; justify-content: space-between; gap: 12px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .stats-row:last-child { border-bottom: none; }
  .stats-row .n { font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-weight: 700; white-space: nowrap; }

  /* Search results pane */
  /* высота под ~7 результатов — «Последние просмотренные» отступают вниз (они в потоке, margin-top:auto) */
  #search-results { max-height: 480px; overflow-y: auto; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; margin-top: 4px; display: none; }
  #search-results .item {
    padding: 6px 8px; font-size: 11px; cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  #search-results .item:last-child { border-bottom: none; }
  #search-results .item:hover { background: var(--border); }
  #search-results .item .cad { font-family: 'IBM Plex Mono', monospace; color: var(--accent); }
  #search-results .item .who { color: var(--muted); font-size: 10px; margin-top: 2px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Mobile */
  @media (max-width: 900px) {
    aside.left, aside.right { width: 182px; }
  }

  /* Телефоны: карта на весь экран, панели выезжают по кнопкам */
  #panel-toggle, #controls-toggle, #mobile-backdrop { display: none; }
  @media (max-width: 600px) {
    header { padding: 5px 12px; }
    header h1 { font-size: 9px; line-height: 1.18; }
    header .left .label { font-size: 7px; letter-spacing: 1px; margin-bottom: 1px; }
    header .right { gap: 8px; font-size: 11px; flex-wrap: wrap; justify-content: flex-end; }
    header .right .l { font-size: 8px; }

    #panel-toggle, #controls-toggle {
      display: block; position: absolute; top: 15px; z-index: 1100;
      width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--accent);
      background: var(--surface); color: var(--accent); font-size: 17px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    #panel-toggle { left: 8px; }
    #controls-toggle { right: 8px; }
    /* при открытой панели — прячем её кнопку */
    body.panel-open #panel-toggle { display: none; }
    body.controls-open #controls-toggle { display: none; }

    /* затемнение-оверлей: тап по нему сворачивает панели */
    #mobile-backdrop {
      display: none; position: absolute; inset: 0; z-index: 1080;
      background: rgba(0,0,0,0.35);
    }
    body.panel-open #mobile-backdrop,
    body.controls-open #mobile-backdrop { display: block; }
    /* правые контролы поверх оверлея, когда раскрыты */
    body.controls-open .leaflet-top.leaflet-right { z-index: 1085; }

    aside.left {
      position: absolute; top: 0; left: 0; bottom: 0; z-index: 1090;
      width: 80vw; max-width: 320px;
      transform: translateX(-100%); transition: transform 0.25s ease;
      box-shadow: 2px 0 16px rgba(0,0,0,0.6);
    }
    body.panel-open aside.left { transform: translateX(0); }
    .layout { position: relative; }
    #map { width: 100%; }

    /* zoom — ниже бургера, слева */
    .leaflet-top.leaflet-left .leaflet-control-zoom { margin-top: 60px; margin-left: 8px; }
    .leaflet-control-zoom a { width: 36px; height: 36px; line-height: 36px; font-size: 22px; }

    /* попап — уже, с отступами, не перекрывает кнопки */
    .leaflet-popup-content { font-size: 12px; margin: 10px 12px; }
    .leaflet-popup-content-wrapper { max-width: 88vw; }

    /* правые контролы (схема + ЕГРН) скрыты, показываются по кнопке ⚙ */
    .leaflet-control-layers, .egrn-control { display: none; min-width: 150px; font-size: 13px; }
    body.controls-open .leaflet-control-layers,
    body.controls-open .egrn-control { display: block; }
    .egrn-btn { font-size: 12px; padding: 7px 9px; }
  }

  /* Минимальный UI — оставлен только поиск по кадастру (но фильтр ЕГРН показываем) */
  .filter-group:not(:first-of-type):not(:has(#egrn-filter)),
  #btn-export-all,
  #btn-toggle-polys,
  #btn-reset,
  aside.left .stats-block,
  header .right > div:nth-child(n+3),
  .council-marker {
    display: none !important;
  }

  /* Полупрозрачность всего слоя полигонов целиком —
     наложения не суммируются, цвет ровный */
  .leaflet-overlay-pane svg { opacity: 1; }

  .leaflet-control-layers { min-width: 158px; }
  .egrn-control { padding: 6px 8px !important; margin-top: 8px !important; min-width: 158px; }
  .egrn-control > div:first-child { font-size: 9px !important; margin-bottom: 4px !important; }
  #egrn-filter { gap: 3px !important; }
  .egrn-btn {
    padding: 4px 8px; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 3px; cursor: pointer;
    font-family: inherit; font-size: 11px; text-align: left; transition: all 0.12s; width: 100%;
  }
  .egrn-btn:hover { border-color: var(--green); }
  .egrn-btn.active { background: var(--green); color: #fff; border-color: var(--green); font-weight: 600; }
  .egrn-btn[data-mode="egrn"].active { background: #2ecc40; border-color: #2ecc40; }
</style>
</head>
<body>
<header>
  <div class="left">
    <div class="label">КАДАСТРОВАЯ КАРТА</div>
    <h1><span class="h-sub">Херсонская обл</span><br><span class="h-sub">Генический р-н</span><br><span class="h-main">с. Бухта</span></h1>
  </div>
  <div class="right">
    <div><div class="v" id="hstat-parcels">0</div><div class="l">участков</div></div>
    <div><div class="v" id="hstat-area">0</div><div class="l">га</div></div>
    <div><div class="v" id="hstat-councils">0</div><div class="l">сельсоветов</div></div>
    <div><div class="v" id="hstat-filtered">—</div><div class="l">отфильтр. участков</div></div>
    <div><div class="v" id="hstat-filtered-area">—</div><div class="l">отфильтр. га</div></div>
    <button id="stats-btn" title="Статистика по участкам и домам">📊 Статистика</button>
  </div>
</header>
<div id="stats-modal">
  <div class="stats-card">
    <div class="stats-head"><span>📊 Статистика</span><button id="stats-close">×</button></div>
    <div id="stats-body"></div>
  </div>
</div>

<div class="layout">
  <button id="panel-toggle" title="Меню" onclick="document.body.classList.add('panel-open')">☰</button>
  <button id="controls-toggle" title="Слои и фильтр" onclick="document.body.classList.add('controls-open')">⚙</button>
  <div id="mobile-backdrop" onclick="document.body.classList.remove('panel-open','controls-open')"></div>
  <aside class="left">
    <div class="filter-group">
      <label>Поиск (кадастр, ФИО, адрес)</label>
      <input id="search" type="text" placeholder="" autocomplete="off"/>
      <div id="search-results"></div>
    </div>


    <div class="recent-block">
      <label style="display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Последние просмотренные</label>
      <div id="recent-list"></div>
    </div>

    <div class="filter-group">
      <label>Арендатор</label>
      <select id="filter-renter">
        <option value="">— все —</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Форма собственности <span style="text-transform:none;color:var(--muted);letter-spacing:0;font-size:9px">(несколько)</span></label>
      <div id="filter-ownership" style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:11px"></div>
    </div>

    <div class="filter-group">
      <label>Категория земель</label>
      <select id="filter-category">
        <option value="">— все —</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Регион</label>
      <select id="filter-region">
        <option value="">— все —</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Размежевание (RU кадастр)</label>
      <select id="filter-mz">
        <option value="">— любые —</option>
        <option value="yes">только размежёванные</option>
        <option value="no">только не размежёванные</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Год окончания договора</label>
      <select id="filter-lease-year">
        <option value="">— любой —</option>
        <option value="expired">просрочен (до 2026)</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
        <option value="2029">2029</option>
        <option value="2030">2030</option>
        <option value="2030+">2030 и позже</option>
        <option value="none">нет договора</option>
      </select>
    </div>

    <button class="btn-export" id="btn-export-all">📥 Выгрузить в Excel</button>
    <button class="btn-reset" id="btn-toggle-polys" style="background:transparent;color:var(--blue);border-color:var(--blue);margin-bottom:6px">⌘ Контуры участков</button>
    <button class="btn-reset" id="btn-reset">Сбросить фильтры</button>

    <div style="height: 16px"></div>

    <div class="stats-block" style="border:1px solid var(--accent)">
      <h3>🛒 Корзина: <span id="basket-count" style="color:var(--accent)">0</span> участков</h3>
      <textarea id="basket-input" placeholder="Вставьте кадастры через перенос строки или запятую — добавятся в корзину" rows="3" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:3px;padding:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;resize:vertical;margin-bottom:6px"></textarea>
      <button id="btn-basket-add" class="btn-export" style="margin-bottom:4px">Добавить в корзину</button>
      <button id="btn-basket-export" class="btn-export" style="background:var(--green);color:#fff;border-color:var(--green);margin-bottom:4px">📥 Выгрузить корзину</button>
      <button id="btn-basket-clear" class="btn-reset" style="margin-bottom:0">Очистить корзину</button>
      <div style="color:var(--muted);font-size:10px;margin-top:6px">Клик по полигону на карте — тоже добавит/уберёт</div>
    </div>

    <div style="height: 16px"></div>

    <div class="stats-block">
      <h3>Все арендаторы (<span id="renters-count">0</span>) <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;float:right">клик = фильтр</span></h3>
      <input id="renters-search" type="text" placeholder="фильтр по имени…" style="width:100%;padding:6px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:3px;font-family:inherit;font-size:11px;margin-bottom:8px"/>
      <div id="top-renters" style="max-height:380px;overflow-y:auto"></div>
    </div>

    <div class="stats-block">
      <h3>Форма собственности</h3>
      <div id="ownership-split"></div>
    </div>
  </aside>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate.min.js"></script>
<script id="data" type="application/json">{"councils": [{"code": "2320355400", "name": "с. Бухта", "lat": 46.2487, "lon": 35.2517, "region": "Херсонская область", "total": 524, "area": 120.7, "by_ownership": {}, "top_owners": [], "top_renters": [], "top_categories": [], "lease_years": {}}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const COUNCILS = DATA.councils;
const STATS = DATA.stats || { ownership_split:{}, total_parcels:0, total_area:0, councils:0, top_renters:[] };
const FILTERS = DATA.filters || { renters:[], ownership:[], categories:[], regions:[] };
const RENTER_COUNCILS = DATA.renter_councils || {};

// Init map
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false,
  rotate: true,
  bearing: 60,
  rotateControl: { closeOnZeroBearing: false },
  zoomSnap: 0.1,
  zoomDelta: 0.5,
  inertia: false,                    // без инерции — рамка держит жёстко, без отскока
  minZoom: 15,                       // ближе 15 не отдалять
  maxBounds: [[46.0687, 35.1796], [46.3967, 35.3148]], // центр — участок 11:003:0238, за края не выйти
  maxBoundsViscosity: 1.0            // жёсткая граница
}).setView([46.23268, 35.24722], 16.3); // старт — центр участка 0238

// Принудительно выставляем bearing — иногда option в L.map({...}) не применяется
if (typeof map.setBearing === 'function') map.setBearing(60);

// Polygon layers cache, keyed by council code
const polygonLayers = {};        // code → L.geoJSON
const rfCornerGroups = [];        // группы красных уголков (участки с адресом РФ)
const parcelGeomIndex = {};      // cadnum → feature (for popups)
let polygonsVisible = true;

// Per-council parcel data cache (lazy-loaded)
async function ensureCouncilParcels(council) {
  if (council.parcels) return council.parcels;
  if (council._loading) return council._loading;
  council._loading = (async () => {
    try {
      const resp = await fetch(`councils/${council.code}.json`);
      if (!resp.ok) { council.parcels = []; return []; }
      const data = await resp.json();
      council.parcels = data.parcels || [];
      council.unbound = data.unbound || []; // дома без привязки к укр. участку (для статистики)
      return council.parcels;
    } catch (e) {
      console.warn(`No data for ${council.code}:`, e);
      council.parcels = [];
      return [];
    }
  })();
  const result = await council._loading;
  delete council._loading;
  return result;
}

// Площадь участка по кадастру
function parcelArea(cad) {
  const c = COUNCILS.find(x => x.code === cad.slice(0, 10));
  const d = c && c.parcels ? c.parcels.find(p => p.c === cad) : null;
  return d ? (d.a || 0) : Infinity;
}
// Точка внутри кольца (ray-casting)
function pointInRing(lng, lat, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
    if (((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi + 1e-20) + xi)) inside = !inside;
  }
  return inside;
}
// Точка внутри участка (с учётом дырок)
function parcelContains(ll, feature) {
  const g = feature.geometry;
  const polys = g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
  for (const poly of polys) {
    if (pointInRing(ll.lng, ll.lat, poly[0])) {
      let hole = false;
      for (let i = 1; i < poly.length; i++) if (pointInRing(ll.lng, ll.lat, poly[i])) { hole = true; break; }
      if (!hole) return true;
    }
  }
  return false;
}
// Найти САМЫЙ МЕЛКИЙ видимый участок под точкой (самый конкретный)
function findSmallestParcelAt(ll) {
  let best = null, bestA = Infinity;
  for (const code in polygonLayers) {
    polygonLayers[code].eachLayer(l => {
      const el = l.getElement && l.getElement();
      if (el && el.style.display === 'none') return; // скрыт фильтром
      if (parcelContains(ll, l.feature)) {
        const a = parcelArea(l.feature.properties.cadnum);
        if (a < bestA) { bestA = a; best = l; }
      }
    });
  }
  return best;
}

// Карта вложенности: cad контейнера → [layer вложенных участков]
const nestedMap = {};
let HOVERED = null; // текущий подсвеченный слой — подсвечен всегда максимум один
function computeNested(layer) {
  const items = [];
  layer.eachLayer(l => {
    const cad = l.feature.properties.cadnum;
    items.push({ l, cad, b: l.getBounds(), a: parcelArea(cad), ctr: l.getBounds().getCenter() });
  });
  items.forEach(big => {
    const nested = [];
    items.forEach(small => {
      if (small.cad === big.cad) return;
      if (small.a < big.a && big.b.contains(small.ctr) && parcelContains(small.ctr, big.l.feature)) {
        nested.push(small.l);
      }
    });
    if (nested.length) nestedMap[big.cad] = nested;
  });
}

// Упорядочить полигоны по площади: большие вниз, мелкие наверх —
// чтобы вложенные/перекрытые участки оставались кликабельными
function reorderByArea(layer, council) {
  const areaOf = cad => { const d = (council.parcels || []).find(p => p.c === cad); return d ? (d.a || 0) : 0; };
  const ls = [];
  layer.eachLayer(l => ls.push(l));
  ls.sort((a, b) => areaOf(b.feature.properties.cadnum) - areaOf(a.feature.properties.cadnum));
  ls.forEach(l => l.bringToFront()); // большой первый уходит вниз, мелкий последний — наверх
}

async function loadCouncilPolygons(code) {
  if (polygonLayers[code]) return polygonLayers[code];
  const council = COUNCILS.find(c => c.code === code);
  if (!council) return null;
  // Ensure council data is loaded for popup info
  await ensureCouncilParcels(council);
  try {
    const resp = await fetch(`parcels/${code}.geojson`);
    if (!resp.ok) return null;
    const fc = await resp.json();
    const layer = L.geoJSON(fc, {
      style: f => parcelStyle(f, council),
      onEachFeature: (f, l) => {
        const cad = f.properties.cadnum;
        parcelGeomIndex[cad] = f;
        const data = (council.parcels || []).find(p => p.c === cad);
        l.bindPopup(buildParcelPopup(cad, data, council));
        const unhover = lyr => {
          const c2 = lyr.feature.properties.cadnum;
          if (basket.has(c2)) lyr.setStyle({ color:'#ff0', weight:3, fillOpacity:0.7 });
          else layer.resetStyle(lyr);
        };
        l.on('mouseover', () => {
          // страховка: подсвечен максимум один участок (лишние mouseover не залипают)
          if (HOVERED && HOVERED !== l) unhover(HOVERED);
          HOVERED = l;
          const nested = nestedMap[cad];
          // Контейнер НЕ поднимаем наверх (вложенные остаются кликабельными и порядок
          // слоёв не перетасовывается под курсором — иначе браузер шлёт ложные mouseover)
          if (!nested) l.bringToFront(); // мелкий — поднять, чтобы обводка была видна целиком
          if (!basket.has(cad)) l.setStyle({ weight: 3, color: '#fff' });
        });
        l.on('mouseout', () => {
          if (HOVERED === l) HOVERED = null;
          unhover(l);
        });
        // Shift+click — добавить/убрать из корзины
        l.on('click', e => {
          if (e.originalEvent.shiftKey) {
            basketToggle(cad);
            L.DomEvent.stopPropagation(e);
          }
        });
        // Apply selected style if in basket
        if (basket.has(cad)) l.setStyle({ color:'#ff0', weight:3, fillOpacity:0.7 });
      }
    });
    layer.addTo(map);
    reorderByArea(layer, council); // большие вниз, мелкие наверх → вложенные кликабельны
    computeNested(layer); // предвычислить вложенность для подсветки при наведении
    addRfCorners(layer, council); // красный уголок на участках с адресом РФ
    polygonLayers[code] = layer;
    if (!map._smallestClickBound) {
      map._smallestClickBound = true;
      // Клик по карте → открыть попап самого мелкого участка под точкой
      // (надёжнее SVG z-order при наложениях участков)
      map.on('click', e => {
        document.body.classList.remove('panel-open'); // закрыть моб. панель
        if (e.originalEvent && e.originalEvent.shiftKey) return; // shift = корзина
        const best = findSmallestParcelAt(e.latlng);
        if (best) best.openPopup(e.latlng);
      });
    }
    return layer;
  } catch (e) {
    console.warn(`No polygons for ${code}:`, e);
    return null;
  }
}

// Красный уголок-маркер на участках с присвоенным адресом РФ
// Флажок по центру участка с адресом РФ: красный = адрес присвоен,
// зелёный = уже прошла (пере)регистрация в Росреестре по Херсонской области (поле rr)
const flagIcon = color => L.divIcon({
  html: '<div style="position:relative;width:14px;height:16px">'
      + `<div style="position:absolute;left:6px;top:0;width:1.5px;height:16px;background:${color.pole}"></div>`
      + `<div style="position:absolute;left:7px;top:1px;width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid ${color.flag};filter:drop-shadow(0 1px 1px rgba(0,0,0,.6))"></div>`
      + '</div>',
  className: '', iconSize: [14, 16], iconAnchor: [6, 16]   // основание флажка в точке
});
const rfCornerIcon = flagIcon({ pole: '#7a1010', flag: '#e23b3b' });
const rfCornerIconGreen = flagIcon({ pole: '#0a5c2a', flag: '#2ecc71' });
function addRfCorners(layer, council) {
  const grp = L.layerGroup().addTo(map);
  rfCornerGroups.push(grp);
  // Точка внутри СВОЕГО участка, но не внутри чужого — иначе у участков-контейнеров
  // (0310, 0412…) флажок визуально «стоит» на вложенном участке
  const rings = []; // [{cad, ring, bbox}]
  layer.eachLayer(l => {
    const g = l.feature.geometry;
    const polys = g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
    polys.forEach(poly => {
      const r = poly[0];
      const xs = r.map(p => p[0]), ys = r.map(p => p[1]);
      rings.push({ cad: l.feature.properties.cadnum, ring: r,
        bbox: [Math.min(...xs), Math.min(...ys), Math.max(...xs), Math.max(...ys)] });
    });
  });
  const insideForeign = (x, y, cad) => rings.some(r =>
    r.cad !== cad && x >= r.bbox[0] && x <= r.bbox[2] && y >= r.bbox[1] && y <= r.bbox[3] && pointInRing(x, y, r.ring));
  layer.eachLayer(l => {
    const cad = l.feature.properties.cadnum;
    const d = (council.parcels || []).find(p => p.c === cad);
    if (!d || !d.fias) return;
    const g = l.feature.geometry;
    const ring = g.type === 'Polygon' ? g.coordinates[0] : g.coordinates[0][0];
    const xs = ring.map(p => p[0]), ys = ring.map(p => p[1]);
    const ccx = xs.reduce((a, b) => a + b, 0) / xs.length;
    const ccy = ys.reduce((a, b) => a + b, 0) / ys.length;
    const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
    // кандидаты: центроид + сетка 9×9, ближние к центру — первыми
    const cands = [[ccx, ccy]];
    for (let fy = 0.1; fy <= 0.9; fy += 0.1)
      for (let fx = 0.1; fx <= 0.9; fx += 0.1)
        cands.push([minX + (maxX - minX) * fx, minY + (maxY - minY) * fy]);
    cands.sort((a, b) => (Math.hypot(a[0]-ccx, a[1]-ccy)) - (Math.hypot(b[0]-ccx, b[1]-ccy)));
    let best = null, fallback = null;
    for (const [tx, ty] of cands) {
      if (!pointInRing(tx, ty, ring)) continue;
      if (!fallback) fallback = [tx, ty];
      if (!insideForeign(tx, ty, cad)) { best = [tx, ty]; break; }
    }
    const pt = best || fallback;
    if (!pt) return;
    L.marker([pt[1], pt[0]], { icon: d.rr ? rfCornerIconGreen : rfCornerIcon, interactive: false, keyboard: false }).addTo(grp);
  });
}

function parcelStyle(f, council) {
  const cad = f.properties.cadnum;
  const data = council ? council.parcels.find(p => p.c === cad) : null;
  // Крупные участки часто содержат внутри вложенные — даём им слабую заливку,
  // чтобы внутренние участки просвечивали и были видны
  const big = data && (data.a || 0) > 0.2;
  // Зарегистрирован в ЕГРН (РФ) → единый голубой для ВСЕХ (обводка везде жёлтая)
  if (data && data.egrn) {
    return { fillColor: '#5bb8ff', color: '#ffd84a', weight: 0.8, opacity: 1, fillOpacity: 0.42 };
  }
  // Государственная собственность → насыщенно-розовая заливка (заметнее)
  if (data && data.ot === 'Державна власність') {
    return { fillColor: '#ff4d94', color: '#ffd84a', weight: 0.6, opacity: 1, fillOpacity: big ? 0.15 : 0.45 };
  }
  // остальные — салатовые
  return { fillColor: '#c8e89c', color: '#ffd84a', weight: 0.6, opacity: 1, fillOpacity: big ? 0.06 : 0.18 };
}

const CHECK_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
function copyCad(text, btn, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  const done = () => {
    const o = btn.innerHTML;
    btn.innerHTML = CHECK_ICON;
    btn.style.background = '#2ecc40';
    btn.style.color = '#fff';
    btn.style.borderColor = '#2ecc40';
    setTimeout(() => { btn.innerHTML = o; btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = ''; }, 1200);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else { fallbackCopy(text, done); }
}
function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); done(); } catch (e) {}
  document.body.removeChild(ta);
}
const COPY_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const COPY_BTN = (txt) => `<button onclick="copyCad('${txt}',this,event)" title="копировать" style="margin-left:6px;padding:2px 6px;background:#1a1a1a;color:var(--accent);border:1px solid var(--accent);border-radius:3px;cursor:pointer;vertical-align:middle;line-height:0">${COPY_ICON}</button>`;

// Массивы показываем все, включая «З.Берег» (вернули по просьбе)
const znDisp = zn => zn || '';

function buildParcelPopup(cad, data, council) {
  const inBasket = basket.has(cad);
  const basketBtn = `<button onclick="basketToggle('${cad}')" style="margin-top:6px;padding:4px 10px;background:${inBasket?'#e05252':'var(--accent)'};color:#1a1a1a;border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600">${inBasket?'− убрать из корзины':'+ в корзину'}</button>`;
  if (!data) {
    return `<div style="font-size:12px;color:#e8c547"><div style="font-family:'IBM Plex Mono',monospace;font-weight:600">${cad}</div><div style="color:#aaa;font-size:11px">нет данных в базе</div>${basketBtn}</div>`;
  }
  const expColor = data.ey && data.ey < 2026 ? '#ff7575' : data.ey && data.ey <= 2027 ? '#ffc66e' : '#e8e8e8';
  const OWN_RU = {
    'Приватна власність': 'Частная собственность',
    'Комунальна власність': 'Коммунальная собственность',
    'Державна власність': 'Государственная собственность',
    'Не визначено': 'Не определено'
  };
  const otRu = data.ot ? (OWN_RU[data.ot] || data.ot) : '';
  // расшифровка статуса р/с/с+ (предположительно — уточнить)
  const ST_RU = { 'р': 'рынок', 'с': 'своё', 'с+': 'своё +' };
  const stTxt = data.st ? (ST_RU[data.st] || data.st) : '';
  return `
    <div style="font-size:12px;color:#e8e8e8;max-width:320px;line-height:1.45">
      <div style="font-family:'IBM Plex Mono',monospace;font-weight:600;color:#e8c547;font-size:13px;margin-bottom:2px">${cad}${COPY_BTN(cad)}</div>
      <div style="font-size:14px;color:#aaa;margin-bottom:6px;font-weight:600">${data.a} га</div>
      ${znDisp(data.zn) ? `<div><b style="color:#aaa">массив:</b> ${znDisp(data.zn)}</div>` : ''}
      ${data.o ? `<div><b style="color:#aaa">владелец:</b> ${data.o}</div>` : ''}
      ${data.r ? `<div><b style="color:#aaa">аренд.:</b> ${data.r}</div>` : ''}
      ${data.ed ? `<div><b style="color:#aaa">договор до:</b> <span style="color:${expColor}">${data.ed}</span>${data.cn?` · №${data.cn}`:''}</div>` : ''}
      ${data.cadrf ? `<div style="margin-top:4px"><span title="есть РФ-кадастр">🇷🇺</span> <b style="color:#aaa">кадастровый РФ:</b> <span style="font-family:'IBM Plex Mono',monospace;color:#e8c547">${data.cadrf}</span>${COPY_BTN(data.cadrf)}</div>` : ''}
      ${data.egrn ? `<div style="color:#4caf7d;font-weight:600;margin-top:2px">✓ оформлен ЕГРН${(typeof data.egrn==='string' && data.egrn && data.egrn!=='да') ? ` · ${data.egrn}` : ''}</div>` : ''}
      ${data.fias ? `<div style="margin-top:4px"><b style="color:#aaa">адрес РФ:</b> с. Бухта, ${data.fias}</div>` : ''}
      ${data.rr ? `<div style="color:#2ecc71;font-weight:600;margin-top:2px">🟢 Зарегистрирован в Росреестре (Херсонская обл.)</div>` : ''}
      ${data.building ? `<div style="margin-top:5px;padding:5px 8px;border:1px solid var(--border);border-radius:4px"><b style="color:#aaa">🏠 Здание:</b> ${data.building}${data.bcadrf ? `<div style="margin-top:2px"><b style="color:#aaa">кадастр здания:</b> <span style="font-family:'IBM Plex Mono',monospace;color:#e8c547">${data.bcadrf}</span>${COPY_BTN(data.bcadrf)}</div>` : ''}</div>` : ''}
      ${data.post ? `<div style="color:#aaa;font-size:11px;margin-top:3px">постановление № ${data.post}</div>` : ''}
      ${otRu ? `<div style="color:#aaa;font-size:12px;margin-top:6px">${otRu}</div>` : ''}
    </div>`;
}

function togglePolygons() {
  // Полигоны всегда видны — toggle отключён
  Object.values(polygonLayers).forEach(l => { if (!map.hasLayer(l)) l.addTo(map); });
}
// Базовые слои
const baseDark = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OpenStreetMap', className: 'map-tiles map-tiles-dark',
});
const baseLight = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OpenStreetMap',
});
const baseSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: '© Esri Imagery',
});
baseDark.addTo(map);

// Dark filter только для baseDark
const style = document.createElement('style');
style.textContent = '.map-tiles-dark { filter: invert(0.92) hue-rotate(180deg) brightness(0.9) contrast(0.85) saturate(0.7); }';
document.head.appendChild(style);

L.control.layers({
  'Схема тёмная': baseDark,
  'Схема светлая': baseLight,
  'Спутник': baseSat,
}, null, { collapsed: false, position: 'topright' }).addTo(map);

// Контрол фильтра ЕГРН — рядом со слоями (справа вверху)
const egrnControl = L.control({ position: 'topright' });
egrnControl.onAdd = function () {
  const div = L.DomUtil.create('div', 'leaflet-control-layers egrn-control');
  div.innerHTML = `
    <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600">Оформление ЕГРН</div>
    <div id="egrn-filter" style="display:flex;flex-direction:column;gap:4px">
      <button class="egrn-btn active" data-mode="all">Все участки</button>
      <button class="egrn-btn" data-mode="egrn">✓ Только с ЕГРН</button>
      <button class="egrn-btn" data-mode="other">Без ЕГРН</button>
      <button class="egrn-btn" data-mode="addr">🚩 С адресами ХО</button>
    </div>`;
  L.DomEvent.disableClickPropagation(div);
  return div;

let markers = {};
let activeCode = null;
let filterRenter = '';
let filterOwnership = new Set();
let filterCategory = '';
let filterRegion = '';
let filterLeaseYear = '';
let filterMz = '';

function matchLeaseYear(p) {
  if (!filterLeaseYear) return true;
  const y = p.ey;
  if (filterLeaseYear === 'none') return !y;
  if (filterLeaseYear === 'expired') return y && y < 2026;
  if (filterLeaseYear === '2030+') return y && y >= 2030;
  return y && String(y) === filterLeaseYear;
}

function markerSize(count) {
  // Logarithmic scale
  if (count <= 1) return 22;
  return Math.min(60, 22 + Math.log2(count) * 5);
}

function markerColor(council, filteredCount) {
  if (filteredCount === 0) return '#3a3f55';
  if (filteredCount < council.total * 0.3) return '#e08252';
  return '#e8c547';
}

function parcelMatchesFilters(p, councilRegion) {
  if (filterRegion && councilRegion !== filterRegion) return false;
  if (filterRenter && p.r !== filterRenter) return false;
  if (filterOwnership.size > 0 && !filterOwnership.has(p.ot)) return false;
  if (filterCategory && p.ct !== filterCategory) return false;
  if (!matchLeaseYear(p)) return false;
  if (filterMz === 'yes' && !p.mz) return false;
  if (filterMz === 'no' && p.mz) return false;
  return true;
}

function hasAnyFilter() {
  return !!(filterRenter || filterOwnership.size > 0 || filterCategory || filterRegion || filterLeaseYear || filterMz);
}

function getFilteredCount(council) {
  return getFilteredStats(council).count;
}

// v2: используем агрегаты, если parcels не загружены
function getFilteredStats(council) {
  if (!hasAnyFilter()) return { count: council.total, area: council.area };
  // If parcels already loaded, compute exactly
  if (council.parcels) {
    let n = 0, a = 0;
    for (const p of council.parcels) if (parcelMatchesFilters(p, council.region)) { n++; a += p.a || 0; }
    return { count: n, area: Math.round(a * 10) / 10 };
  }
  // Otherwise approximate from aggregates
  if (filterRegion && council.region !== filterRegion) return { count: 0, area: 0 };
  let fraction = 1.0;
  if (filterRenter) {
    const r = (council.top_renters || []).find(([n,_]) => n === filterRenter);
    fraction *= r ? r[1] / council.total : 0;
  }
  if (filterOwnership.size > 0) {
    let n = 0;
    for (const ot of filterOwnership) n += council.by_ownership[ot] || 0;
    fraction *= n / council.total;
  }
  if (filterCategory) {
    const c = (council.top_categories || []).find(([n,_]) => n === filterCategory);
    fraction *= c ? c[1] / council.total : 0;
  }
  if (filterLeaseYear) {
    let ly_count = 0;
    if (filterLeaseYear === 'none') {
      const has_lease = Object.values(council.lease_years || {}).reduce((s,v)=>s+v, 0);
      ly_count = council.total - has_lease;
    } else if (filterLeaseYear === 'expired') {
      for (const [y, c] of Object.entries(council.lease_years || {})) {
        if (parseInt(y) < 2026) ly_count += c;
      }
    } else if (filterLeaseYear === '2030+') {
      for (const [y, c] of Object.entries(council.lease_years || {})) {
        if (parseInt(y) >= 2030) ly_count += c;
      }
    } else {
      ly_count = (council.lease_years || {})[filterLeaseYear] || 0;
    }
    fraction *= ly_count / council.total;
  }
  const count = Math.round(council.total * fraction);
  const area = Math.round(council.area * fraction * 10) / 10;
  return { count, area };
}

function fmt(n) { return Number(n).toLocaleString('ru'); }

function buildMarkers() {
  // Clear existing
  for (const k in markers) { map.removeLayer(markers[k]); }
  markers = {};

  const hasFilter = hasAnyFilter();
  let totalCount = 0, totalArea = 0;

  COUNCILS.forEach(c => {
    if (!c.lat) return;
    const fs = getFilteredStats(c);
    totalCount += fs.count;
    totalArea += fs.area;
    const sz = markerSize(c.total);
    const col = markerColor(c, fs.count);
    const icon = L.divIcon({
      html: `<div class="council-marker" style="width:${sz}px;height:${sz}px;background:${col};font-size:${Math.max(9, sz/4)}px"></div>`,
      className: '', iconSize: [sz, sz], iconAnchor: [sz/2, sz/2]
    });
    const m = L.marker([c.lat, c.lon], { icon }).addTo(map);
    const ttArea = hasFilter
      ? `${fmt(fs.area)} / ${fmt(c.area)} га`
      : `${fmt(c.area)} га`;
    m.bindTooltip(`<div class="pname">${c.name}</div><div class="pstats">${fs.count} участков · ${ttArea}</div>`, {
      direction: 'top', offset: [0, -sz/2], opacity: 0.95
    });
    m.on('click', () => {
      showDetail(c.code);
      loadCouncilPolygons(c.code);  // ленивая подгрузка контуров
    });
    markers[c.code] = m;
  });

  document.getElementById('hstat-filtered').textContent      = hasFilter ? fmt(totalCount) : '—';
  document.getElementById('hstat-filtered-area').textContent = hasFilter ? fmt(Math.round(totalArea * 10) / 10) : '—';
  // Сумма по советам в шапку (вместо STATS.total_*)
  const sumCount = COUNCILS.reduce((s,c) => s + (c.total || 0), 0);
  const sumArea  = COUNCILS.reduce((s,c) => s + (c.area  || 0), 0);
  document.getElementById('hstat-parcels').textContent = fmt(sumCount);
  document.getElementById('hstat-area').textContent    = fmt(Math.round(sumArea * 10) / 10);
  // Склонение "участков" по числу
  const n = sumCount, m10 = n % 10, m100 = n % 100;
  let word;
  if (m10 === 1 && m100 !== 11) word = 'участок';
  else if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) word = 'участка';
  else word = 'участков';
  const lblEl = document.getElementById('hstat-parcels').nextElementSibling;
  if (lblEl) lblEl.textContent = word;
}

function loadMoreParcels() {
  const parcels = window._curParcels || [];
  const prev = window._curShown || 0;
  const next = Math.min(prev + 300, parcels.length);
  const btn = document.getElementById('parcel-more');
  const head = document.getElementById('parcel-list-head');
  // Insert new cards before the button
  const html = parcels.slice(prev, next).map(renderParcelCard).join('');
  btn.insertAdjacentHTML('beforebegin', html);
  window._curShown = next;
  // Update or remove the button
  if (next >= parcels.length) {
    btn.remove();
    head.textContent = head.textContent.replace(/ — показано .*$/, ` (${parcels.length})`);
  } else {
    btn.textContent = `Показать ещё ${Math.min(300, parcels.length - next)} из ${parcels.length - next}`;
    head.textContent = head.textContent.replace(/показано \d+ из \d+/, `показано ${next} из ${parcels.length}`);
  }
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function downloadCsv(rows, filename) {
  if (!rows.length) { alert('Нет данных для выгрузки'); return; }
  const cols = Object.keys(rows[0]);
  const esc = v => {
    if (v == null) return '';
    const s = String(v);
    return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const lines = [cols.join(';')];
  for (const r of rows) lines.push(cols.map(c => esc(r[c])).join(';'));
  const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function downloadXlsx(rows, filename, sheetName) {
  if (!rows.length) { alert('Нет данных для выгрузки'); return; }
  // Большие выгрузки — CSV вместо XLSX (SheetJS не тянет >100k строк)
  if (rows.length > 50000) {
    if (confirm(`${rows.length.toLocaleString('ru')} строк — XLSX в браузере не справится. Выгрузить в CSV (открывается в Excel)?`)) {
      const csvName = filename.replace(/\.xlsx$/, '.csv');
      downloadCsv(rows, csvName);
    }
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  const widths = {
    'Кадастровый номер': 24, 'Площадь, га': 12, 'Регион': 12,
    'Сельсовет': 28, 'Код сельсовета': 14, 'Форма собственности': 22,
    'Категория земель': 38, 'Собственник': 40, 'Совладельцев всего': 8,
    'ІПН собственника': 14, 'Дата рег. права собств.': 18,
    'Арендатор': 40, 'ЄДРПОУ арендатора': 14, '№ договора': 14,
    'Дата регистрации договора': 18, 'Окончание договора': 16,
    'Размер аренды, грн': 14, '% НГО': 8, 'Адрес': 60,
  };
  ws['!cols'] = Object.keys(rows[0]).map(k => ({ wch: widths[k] || 18 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName || 'Участки');
  XLSX.writeFile(wb, filename);
}

async function exportFiltered() {
  const btn = document.getElementById('btn-export-all');
  const origText = btn.textContent;
  try {
    // Determine which councils to load
    let targetCouncils;
    if (filterRenter && RENTER_COUNCILS[filterRenter]) {
      targetCouncils = COUNCILS.filter(c => RENTER_COUNCILS[filterRenter].includes(c.code));
    } else if (filterRegion) {
      targetCouncils = COUNCILS.filter(c => c.region === filterRegion);
    } else {
      if (!confirm(`Внимание: фильтр не выбран. Будет ~600k участков (Excel может зависнуть). Лучше выбрать арендатора/регион. Всё равно экспортировать?`)) {
        btn.textContent = origText; btn.disabled = false; return;
      }
      targetCouncils = COUNCILS;
    }
    btn.disabled = true;
    btn.textContent = `Загрузка...`;
    const need = targetCouncils.filter(c => !c.parcels);
    if (need.length > 0) {
      let loaded = 0;
      for (let i=0; i<need.length; i+=10) {
        await Promise.all(need.slice(i, i+10).map(c => ensureCouncilParcels(c)));
        loaded += Math.min(10, need.length - i);
        btn.textContent = `Загрузка ${loaded}/${need.length}…`;
      }
    }
    btn.textContent = 'Формирую Excel...';
  const rows = [];
  for (const c of targetCouncils) {
    for (const p of (c.parcels || [])) {
      if (parcelMatchesFilters(p, c.region)) rows.push(parcelsToRows([p], c)[0]);
    }
  }
  const stamp = new Date().toISOString().slice(0,10);
  let suffix = 'все';
  const tags = [];
  if (filterRegion) tags.push('рег_' + filterRegion);
  if (filterRenter) tags.push('аренд_' + filterRenter.slice(0,30).replace(/[^а-яА-Яa-zA-Z0-9]/g,'_'));
  if (filterOwnership.size > 0) tags.push('собств_' + Array.from(filterOwnership).join('_').slice(0,40).replace(/[^а-яА-Яa-zA-Z0-9]/g,'_'));
  if (filterCategory) tags.push('кат_' + filterCategory.slice(0,30).replace(/[^а-яА-Яa-zA-Z0-9]/g,'_'));
  if (filterLeaseYear) tags.push('год_' + filterLeaseYear);
  if (tags.length) suffix = tags.join('__');
  downloadXlsx(rows, `Кадастр_${suffix}_${stamp}.xlsx`, 'Участки');
  } catch (e) {
    alert('Ошибка экспорта: ' + (e.message || e));
    console.error(e);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

async function exportCouncil(code) {
  const c = COUNCILS.find(x => x.code === code);
  if (!c) return;
  await ensureCouncilParcels(c);
  const parcels = (c.parcels || []).filter(p => parcelMatchesFilters(p, c.region));
  const rows = parcelsToRows(parcels, c);
  const stamp = new Date().toISOString().slice(0,10);
  const safe = c.name.replace(/[^а-яА-Яa-zA-Z0-9]/g,'_');
  downloadXlsx(rows, `${safe}_${stamp}.xlsx`, c.name.slice(0,30));
}

// Highlight a specific parcel polygon: pan and bring popup up
async function navigateToParcel(cadnum) {
  document.body.classList.remove('panel-open'); // закрыть моб. панель
  const rada = cadnum.slice(0, 10);
  const council = COUNCILS.find(c => c.code === rada);
  if (!council) {
    sr.innerHTML = `<div class="item" style="color:var(--muted)">Сельсовет ${rada} не найден на карте</div>`;
    sr.style.display = 'block';
    return;
  }
  // Center on council, open details, load polygons
  map.flyTo([council.lat, council.lon], 14, { duration: 0.5 });
  showDetail(council.code);
  const layer = await loadCouncilPolygons(council.code);
  if (!layer) {
    sr.innerHTML = `<div class="item" style="color:var(--muted)">Полигоны ${rada} не загрузились</div>`;
    sr.style.display = 'block';
    return;
  }
  // Find the specific feature
  let target = null;
  layer.eachLayer(l => {
    if (l.feature && l.feature.properties.cadnum === cadnum) target = l;
  });
  if (target) {
    // Zoom to parcel + open popup
    const b = target.getBounds();
    // animate:false обязательно: анимированный fitBounds с leaflet-rotate молча не срабатывает
    map.fitBounds(b, { padding: [60, 60], maxZoom: 18, animate: false });
    setTimeout(() => target.openPopup(), 600);
    // Briefly highlight
    target.setStyle({ weight: 3, color: '#ff0' });
    setTimeout(() => layer.resetStyle(target), 3000);
  } else {
    sr.innerHTML = `<div class="item" style="color:var(--muted)">Кадастр ${cadnum} нет в полигонах</div>`;
    sr.style.display = 'block';
    return;
  }
}

const CADNUM_RE = /^\d{10}:\d{2}:\d{3}:\d{4}$/;

// Ввод в неправильной раскладке: латиница → русские буквы той же клавиши («yf,thtiyfz» → «набережная»)
const LAYOUT_EN_RU = {'q':'й','w':'ц','e':'у','r':'к','t':'е','y':'н','u':'г','i':'ш','o':'щ','p':'з','[':'х',']':'ъ','a':'ф','s':'ы','d':'в','f':'а','g':'п','h':'р','j':'о','k':'л','l':'д',';':'ж','\'':'э','z':'я','x':'ч','c':'с','v':'м','b':'и','n':'т','m':'ь',',':'б','.':'ю','`':'ё','{':'х','}':'ъ',':':'ж','"':'э','<':'б','>':'ю','~':'ё'};
const fixLayout = s => s.toLowerCase().split('').map(ch => LAYOUT_EN_RU[ch] || ch).join('');

search.addEventListener('input', e => {
  const q = e.target.value.trim();
  if (q.length < 3) { sr.style.display = 'none'; return; }
  // Full cadnum: navigate directly
  if (CADNUM_RE.test(q)) {
    navigateToParcel(q);
    return;
  }
  // 3+ цифр (или фрагмент кадастра с ':') → искать участки по кадастру (укр / РФ / здания)
  if (/^[\d:/]{3,}$/.test(q)) {
    const qd = q.replace(/:/g, '');
    const results = [];
    for (const c of COUNCILS) {
      if (!c.parcels) continue;
      for (const p of c.parcels) {
        const ua = p.c.replace(/:/g, '');
        const rf = (p.cadrf || '').replace(/:/g, '');
        const brf = (p.bcadrf || '').replace(/:/g, '');
        if (ua.includes(qd) || rf.includes(qd) || brf.includes(qd)) {
          results.push({ type: 'parcel', p, council: c });
          if (results.length >= 50) break;
        }
      }
      if (results.length >= 50) break;
    }
    renderSearchResults(results);
    return;
  }
  // Free text — search across loaded councils (partial coverage)
  const textResults = qstr => {
    const ql = qstr.toLowerCase();
    const tokens = ql.split(/[\s,]+/).filter(Boolean); // «набережная 76» → [набережная, 76]
    if (!tokens.length) return [];
    const results = [];
    for (const c of COUNCILS) {
      // Search council name
      if (c.name.toLowerCase().includes(ql)) {
        results.push({ type: 'council', council: c });
        if (results.length >= 50) break;
      }
      // Search loaded parcels (those councils that user already opened)
      if (c.parcels) {
        for (const p of c.parcels) {
          // Адресный/именной текст (без кадастров — чтобы число «76» не ловило кадастр :276)
          const hay = [p.o, p.r, p.ad, p.fias, p.zn, p.building]
            .filter(Boolean).join(' ').toLowerCase();
          // кадастры матчим только длинными токенами (содержат ':' или длиннее 5 символов)
          const cadHay = [p.cadrf, p.bcadrf, p.c].filter(Boolean).join(' ').toLowerCase();
          const hit = tokens.every(t => hay.includes(t) || ((t.includes(':') || t.length > 5) && cadHay.includes(t)));
          if (hit) {
            results.push({ type: 'parcel', p, council: c });
            if (results.length >= 50) break;
          }
        }
        if (results.length >= 50) break;
      }
    }
    return results;
  };
  let results = textResults(q);
  // Ничего не нашли, а в запросе есть латиница? Возможно, забыли переключить
  // раскладку: «yf,thtiyfz» → «набережная», «vjhiytd» → «моршнев»
  if (!results.length && /[a-z\[\];'`,.{}:"<>~]/i.test(q)) {
    const q2 = fixLayout(q);
    if (q2 !== q.toLowerCase()) results = textResults(q2);
  }
  renderSearchResults(results);
});

function renderSearchResults(results) {
  if (!results.length) {
    sr.innerHTML = '<div class="item" style="color:var(--muted)">Ничего не найдено</div>';
    sr.style.display = 'block';
    return;
  }
  sr.innerHTML = results.map((r,i)=>{
    if (r.type === 'council') return `
      <div class="item" data-i="${i}">
        <div class="cad">${escapeHtml(r.council.name)}</div>
        <div class="who">${r.council.code} · ${r.council.total} участков</div>
      </div>`;
    return `
      <div class="item" data-i="${i}">
        <div class="cad">${escapeHtml(r.p.c)}${r.p.fias ? (r.p.rr ? ' 🟢' : ' 🚩') : ''}</div>
        <div class="who">${r.p.o? escapeHtml(r.p.o.slice(0,40)) : escapeHtml(r.council.name)}${znDisp(r.p.zn)? ' · '+escapeHtml(znDisp(r.p.zn)):''}</div>
        ${r.p.fias ? `<div class="who" style="color:#e8c547">📍 с. Бухта, ${escapeHtml(r.p.fias)}${r.p.building?' · зд. '+escapeHtml(r.p.building):''}</div>` : ''}${r.p.cadrf ? `<div class="who" style="font-family:'IBM Plex Mono',monospace;color:#5bb8ff">🇷🇺 ${escapeHtml(r.p.cadrf)}</div>` : ''}
      </div>`;
  }).join('');
  sr.style.display = 'block';
  sr.querySelectorAll('.item').forEach((el,i) => {
    el.addEventListener('click', () => {
      const r = results[i];
      if (r.type === 'council') {
        map.flyTo([r.council.lat, r.council.lon], 13, { duration: 0.6 });
        showDetail(r.council.code);
      } else {
        navigateToParcel(r.p.c);
      }
      sr.style.display = 'none';
    });
  });
}

// ── Фильтр по ЕГРН ──
let egrnMode = 'all';
function applyEgrnFilter() {
  const c = COUNCILS.find(x => x.code === '2320355400');
  const parcels = c?.parcels || [];
  const egrnSet = new Set(parcels.filter(p => p.egrn).map(p => p.c));
  const addrSet = new Set(parcels.filter(p => p.fias).map(p => p.c));
  Object.values(polygonLayers).forEach(layer => {
    layer.eachLayer(l => {
      const cad = l.feature.properties.cadnum;
      let visible = true;
      if (egrnMode === 'egrn') visible = egrnSet.has(cad);
      else if (egrnMode === 'other') visible = !egrnSet.has(cad);
      else if (egrnMode === 'addr') visible = addrSet.has(cad);
      const el = l.getElement && l.getElement();
      if (el) el.style.display = visible ? '' : 'none';
    });
  });
  // красные уголки видны только когда участки видны (режим all или addr)
  rfCornerGroups.forEach(g => { if (egrnMode === 'other') map.removeLayer(g); else if (!map.hasLayer(g)) g.addTo(map); });
  // Пересчёт шапки под выбранный фильтр
  let shown = parcels;
  if (egrnMode === 'egrn') shown = parcels.filter(p => p.egrn);
  else if (egrnMode === 'other') shown = parcels.filter(p => !p.egrn);
  else if (egrnMode === 'addr') shown = parcels.filter(p => p.fias);
  const cnt = shown.length;
  const area = Math.round(shown.reduce((s, p) => s + (p.a || 0), 0) * 10) / 10;
  document.getElementById('hstat-parcels').textContent = fmt(cnt);
  document.getElementById('hstat-area').textContent = fmt(area);
  const m10 = cnt % 10, m100 = cnt % 100;
  const word = (m10 === 1 && m100 !== 11) ? 'участок' : (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) ? 'участка' : 'участков';
  const lbl = document.getElementById('hstat-parcels').nextElementSibling;
  if (lbl) lbl.textContent = word;
}

// Статистика: считается на лету из данных участков
function computeStats() {
  const c = COUNCILS.find(c => c.code === '2320355400');
  const ps = (c && c.parcels) || [];
  const ub = (c && c.unbound) || []; // дома без привязки к укр. участку (Набережная 46 А/Б/В)
  const nHouses = b => { const m = b.match(/стр\.\s*([^)]+)/); return m ? m[1].split(',').length : 1; };
  const withB = ps.filter(p => p.building);
  const housesBound = withB.reduce((a, p) => a + nHouses(p.building), 0);
  return {
    total: ps.length,
    zapEgrn: ps.filter(p => p.egrn && (p.cadrf || '').startsWith('96')).length, // ЕГРН + запорожский кадастр
    khCad: ps.filter(p => (p.cadrf || '').startsWith('94')).length,             // херсонский кадастр (94…)
    zapAddr: ps.filter(p => p.zaddr).length,                                     // старый запорожский адрес
    khAddr: ps.filter(p => p.fias).length,                                       // новый херсонский адрес
    rr: ps.filter(p => p.rr).length,                                             // перерегистрация в Росреестре ХО
    mfc: ps.filter(p => p.mfc).length,                                           // подано на регистрацию в МФЦ (ожидает)
    housesTotal: housesBound + ub.length,
    housesZapAddr: ps.reduce((a, p) => a + (((p.zaddr || '').match(/дом\s*\d/g)) || []).length, 0),
    housesZapCad: ps.filter(p => (p.bcadrf || '').startsWith('96')).length + ub.filter(h => (h.bcadrf || '').startsWith('96')).length,
    housesKhCad: ps.filter(p => (p.bcadrf || '').startsWith('94')).length + ub.filter(h => (h.bcadrf || '').startsWith('94')).length,
    housesKhAddr: housesBound + ub.length,
    // РР только по домам с СОБСТВЕННОЙ выпиской (brr у участка / rr у непривязанного дома),
    // дом на перерегистрированном участке сам по себе не считается
    housesRR: withB.filter(p => p.brr).reduce((a, p) => a + nHouses(p.building), 0) + ub.filter(h => h.rr).length,
    housesMfc: withB.filter(p => p.bmfc).reduce((a, p) => a + nHouses(p.building), 0) + ub.filter(h => h.mfc).length
  };
}
function showStats() {
  const s = computeStats();
  const row = (t, n) => `<div class="stats-row"><span>${t}</span><span class="n">${n}</span></div>`;
  document.getElementById('stats-body').innerHTML =
    `<div class="stats-sec">Участки</div>`
    + row('Всего участков', s.total)
    + row('Имели ЕГРН с запорожским кадастром (96:…)', s.zapEgrn)
    + row('Уже имеют херсонский кадастр (94:…)', s.khCad)
    + row('Со старым запорожским адресом', s.zapAddr)
    + row('Присвоен херсонский адрес в ФИАС', s.khAddr)
    + row('Подано на регистрацию в МФЦ', s.mfc)
    + row('🟢 Адрес сменён в Росреестре (Херсонская обл.)', s.rr)
    + `<div class="stats-sec">Дома</div>`
    + row('Всего домов', s.housesTotal)
    + row('Имели запорожский адрес', s.housesZapAddr)
    + row('С запорожским кадастром (96:…)', s.housesZapCad)
    + row('Уже имеют херсонский кадастр (94:…)', s.housesKhCad)
    + row('Присвоен херсонский адрес в ФИАС', s.housesKhAddr)
    + row('Подано на регистрацию в МФЦ', s.housesMfc)
    + row('🟢 Адрес сменён в Росреестре (Херсонская обл.)', s.housesRR);
  document.getElementById('stats-modal').classList.add('open');
}
document.getElementById('stats-btn').addEventListener('click', showStats);
document.getElementById('stats-close').addEventListener('click', () => document.getElementById('stats-modal').classList.remove('open'));
document.getElementById('stats-modal').addEventListener('click', e => { if (e.target.id === 'stats-modal') e.target.classList.remove('open'); });

// Пересчёт размера карты при повороте телефона / ресайзе
let _resizeT;
window.addEventListener('resize', () => { clearTimeout(_resizeT); _resizeT = setTimeout(() => { map.invalidateSize(); if (CLAMP) { computeLimits(); clampView(); } }, 200); });

// Стартовая позиция — с. Бухта (Генический р-н, Херсонская обл)
// Полоса: от левого края 11:003:0002 до правого края 11:003:0059.
// Старт — максимальный зум на всю полосу (+ ~1 см). Максимальный зум-аут (minZoom) —
// полоса целиком + 3 см с каждой стороны; дальше этого вида карту не сдвинуть
// ни вправо, ни влево, ни вверх, ни вниз (maxBounds). Адаптивно, учитывает bearing 60°.
let CLAMP = null; // {tl, br} — latlng углов видимой области при максимальном зум-ауте
function computeLimits() {
  const A = parcelGeomIndex['2320355400:11:003:0002'];
  const B = parcelGeomIndex['2320355400:11:003:0059'];
  if (!A || !B) return null;
  const pts = f => { const out = []; (function walk(c) { if (typeof c[0] === 'number') out.push(map.latLngToContainerPoint([c[1], c[0]])); else c.forEach(walk); })(f.geometry.coordinates); return out; };
  const pa = pts(A), pb = pts(B);
  const minX = Math.min(...pa.map(p => p.x));   // левый край левого участка (экранный)
  const maxX = Math.max(...pb.map(p => p.x));   // правый край правого участка
  let minY = Infinity, maxY = -Infinity;
  const seeY = p => { if (p.x >= minX && p.x <= maxX) { if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y; } };
  Object.values(parcelGeomIndex).forEach(f => pts(f).forEach(seeY));
  pa.concat(pb).forEach(p => { if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y; });
  const size = map.getSize(), w = size.x, h = size.y;
  const PX_CM = 37.8; // ~1 см в CSS-пикселях
  // зум, при котором полоса + pad px с каждой стороны влезает в экран (вниз до шага 0.1)
  const fitZoom = pad => Math.floor((map.getZoom() + Math.log2(Math.min((w - 2 * pad) / (maxX - minX), (h - 2 * pad) / (maxY - minY)))) * 10) / 10;
  const zMin = fitZoom(Math.round(3 * PX_CM));   // зум-аут: полоса + 3 см с каждой стороны
  // Защита: при нулевом/крошечном контейнере (фоновая вкладка) выйдет NaN —
  // ни в коем случае не скармливать его карте, иначе она «отравится» и умрёт
  if (!isFinite(zMin)) return false;
  const cc = { x: (minX + maxX) / 2, y: (minY + maxY) / 2 };
  map.setMinZoom(zMin);
  // Рамка = то, что видно при максимальном зум-ауте (в экранных координатах,
  // т.е. с учётом поворота); её углы фиксируем как latlng — дальше карту не сдвинуть
  const k = Math.pow(2, map.getZoom() - zMin);
  CLAMP = {
    tl: map.containerPointToLatLng([cc.x - (w / 2) * k, cc.y - (h / 2) * k]),
    br: map.containerPointToLatLng([cc.x + (w / 2) * k, cc.y + (h / 2) * k])
  };
  return true;
}
function clampView() {
  if (!CLAMP || map._clamping || map._animatingZoom) return; // во время анимации зума не дёргаем
  const size = map.getSize(), w = size.x, h = size.y;
  const tl = map.latLngToContainerPoint(CLAMP.tl);
  const br = map.latLngToContainerPoint(CLAMP.br);
  let dx = 0, dy = 0;
  if (br.x - tl.x <= w) dx = (tl.x + br.x - w) / 2;      // рамка уже экрана — центрируем
  else if (tl.x > 0) dx = tl.x;                           // уехали влево за рамку
  else if (br.x < w) dx = br.x - w;                       // уехали вправо
  if (br.y - tl.y <= h) dy = (tl.y + br.y - h) / 2;
  else if (tl.y > 0) dy = tl.y;
  else if (br.y < h) dy = br.y - h;
  if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
    map._clamping = true;
    map.panBy([dx, dy], { animate: false });
    map._clamping = false;
  }
}
function fitStartView() {
  // Контейнер может быть ещё без размера (фоновая вкладка) — ждём, иначе вся математика = NaN
  map.invalidateSize({ animate: false });
  const sz = map.getSize();
  if (!sz.x || !sz.y) { setTimeout(fitStartView, 250); return; }
  if (!computeLimits()) { setTimeout(fitStartView, 250); return; } // жёсткая рамка + minZoom: полоса 0002→0059 + 3 см
  // Первый показ: зум 16.6, полоса 0002→0069 по центру, снизу ~3 см моря
  const A = parcelGeomIndex['2320355400:11:003:0002'];
  const B = parcelGeomIndex['2320355400:11:003:0069'];
  if (!A || !B) return;
  const pts = f => { const out = []; (function walk(c) { if (typeof c[0] === 'number') out.push(map.latLngToContainerPoint([c[1], c[0]])); else c.forEach(walk); })(f.geometry.coordinates); return out; };
  const pa = pts(A), pb = pts(B);
  const minX = Math.min(...pa.map(p => p.x));
  const maxX = Math.max(...pb.map(p => p.x));
  let minY = Infinity, maxY = -Infinity;
  const seeY = p => { if (p.x >= minX && p.x <= maxX) { if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y; } };
  Object.values(parcelGeomIndex).forEach(f => pts(f).forEach(seeY));
  pa.concat(pb).forEach(p => { if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y; });
  const size = map.getSize(), w = size.x, h = size.y;
  const SEA = Math.round(h * 0.142); // море снизу ~3 см (доля высоты экрана — одинаково на всех мониторах)
  // Стартовый зум — ровно 16.6 на любом мониторе (утверждено пользователем)
  const zStart = Math.max(map.getMinZoom(), 16.6);
  const k = Math.pow(2, zStart - map.getZoom());
  const cx = (minX + maxX) / 2;                 // полоса по центру по горизонтали
  const cy = maxY - (h / 2 - SEA) / k;          // нижний край участков → на h-SEA (1 см моря)
  map.setView(map.containerPointToLatLng([cx, cy]), zStart, { animate: false });
  map.on('drag moveend zoomend', clampView);
  clampView();
}
// Автоподгрузка контуров совета на старте + применить фильтр после загрузки
setTimeout(() => loadCouncilPolygons('2320355400').then(() => { applyEgrnFilter(); fitStartView(); }), 100);
